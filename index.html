<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>履修・コンピテンス管理システム</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

    :root {
        --bg-color: #f0f4f8;
        --card-bg: #ffffff;
        --text-main: #2d3436;
        --accent-blue: #0984e3;
        --accent-pink: #e84393;
        --accent-yellow: #fdcb6e;
        --accent-green: #00b894;
        --cell-empty: #dfe6e9;
        --cell-filled: #fab1a0;
        --lunch-color: #f1f2f6;
        --progress-bg: #f1f2f6;
    }

    body {
        font-family: 'Nunito', 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
        margin: 0;
        padding: 10px;
        background-color: var(--bg-color);
        color: var(--text-main);
    }
    
    h1 {
        text-align: center;
        color: var(--accent-blue);
        font-size: 1.1em;
        margin-bottom: 10px;
    }

    /* 学期切り替えタブ */
    .term-selector-container {
        margin-bottom: 15px;
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 5px;
        -webkit-overflow-scrolling: touch;
    }
    .term-tabs {
        display: inline-flex;
        gap: 5px;
    }
    .term-tab {
        padding: 8px 12px;
        background: #fff;
        border-radius: 20px;
        font-size: 0.75em;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .term-tab.active {
        background: var(--accent-blue);
        color: #fff;
        border-color: var(--accent-blue);
    }

    .container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 1000px;
        margin: 0 auto;
    }

    @media (min-width: 768px) {
        .container { flex-direction: row; }
        .timetable-wrapper { flex: 2.5; }
        .summary-wrapper { flex: 1.2; }
    }

    .timetable-wrapper, .summary-wrapper {
        background: var(--card-bg);
        padding: 10px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    table.timetable {
        width: 100%;
        table-layout: fixed;
        border-collapse: separate;
        border-spacing: 2px;
    }

    table.timetable th, table.timetable td {
        border-radius: 6px;
        text-align: center;
        vertical-align: middle;
        overflow: hidden;
        word-wrap: break-word;
        font-size: 0.7em;
    }

    .col-time { width: 18%; font-size: 0.55em; background: #f9f9f9; color: #636e72; font-weight: bold; }
    .col-day { width: 16.4%; }

    table.timetable th {
        background-color: var(--accent-blue);
        color: white;
        padding: 5px 0;
    }

    table.timetable td {
        height: 55px;
        cursor: pointer;
        background-color: var(--cell-empty);
        transition: filter 0.2s;
    }
    table.timetable td:active {
        filter: brightness(0.9);
    }

    .lunch-row td {
        height: 20px;
        background-color: var(--lunch-color);
        font-size: 0.6em;
        color: #b2bec3;
        cursor: default;
    }

    .subject-name {
        font-weight: bold;
        color: #2c3e50;
        font-size: 0.85em;
        line-height: 1.1;
    }
    .subject-memo {
        font-size: 0.65em;
        color: #636e72;
    }

    /* その他（時間割外）エリア */
    .others-section {
        margin-top: 20px;
        border-top: 2px dashed #dfe6e9;
        padding-top: 15px;
    }
    .others-title {
        font-weight: bold;
        color: var(--accent-blue);
        font-size: 0.9em;
        margin-bottom: 10px;
    }
    .others-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .other-item {
        background: #fdfbfb;
        border: 1px solid #eee;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.85em;
        transition: background 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .other-item:hover { background: #f1f2f6; }
    .btn-add-other {
        width: 100%;
        padding: 12px;
        text-align: center;
        background: #e0f7fa;
        color: #0097a7;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        margin-top: 10px;
        transition: background 0.2s;
    }
    .btn-add-other:hover { background: #b2ebf2; }

    /* 集計エリア */
    .summary-title { font-weight: bold; color: var(--accent-blue); margin: 12px 0 6px 0; font-size: 0.9em; border-left: 4px solid var(--accent-blue); padding-left: 8px; }
    .summary-item { padding: 8px 10px; margin-bottom: 8px; background-color: #f8f9fa; border-radius: 10px; font-size: 0.8em; }
    .item-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-weight: bold; }
    
    .progress-bar-bg { width: 100%; height: 6px; background-color: var(--progress-bg); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 0%; background-color: var(--accent-yellow); transition: width 0.5s ease; }
    .progress-bar-fill.achieved { background-color: var(--accent-green); }

    /* データ管理ボタン */
    .data-management-area {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 2px dashed #dfe6e9;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .btn-export, .btn-import, .btn-settings {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 0.85em;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-settings { background: #e8f5e9; color: #2e7d32; }
    .btn-settings:hover { background: #c8e6c9; }
    .btn-export { background: #e3f2fd; color: #1976d2; }
    .btn-export:hover { background: #bbdefb; }
    .btn-import { background: #fbe9e7; color: #d84315; }
    .btn-import:hover { background: #ffccbc; }
    .btn-clear-all { width: 100%; padding: 10px; background: #f1f2f6; color: #636e72; border: none; border-radius: 8px; font-size: 0.8em; cursor: pointer; margin-top: 5px; }

    /* モーダル共通 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 3px; color: #636e72; }
    .form-group input, .form-group select { width: 100%; padding: 8px; border: 2px solid #f1f2f6; border-radius: 8px; font-size: 0.95em; box-sizing: border-box; outline: none; }
    .point-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f8f9fa; padding: 10px; border-radius: 10px; }

    /* 学期選択トグルボタン */
    .modal-term-toggle { padding: 4px 8px; border-radius: 6px; border: 1px solid #dfe6e9; font-size: 0.75em; cursor: pointer; color: #636e72; background: #fff; transition: all 0.2s; user-select: none; }
    .modal-term-toggle.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

    .btn-container { display: flex; gap: 8px; margin-top: 15px; }
    .btn-save, .btn-delete, .btn-cancel { flex: 1; padding: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .btn-save { background: var(--accent-green); color: #fff; flex: 1.5; }
    .btn-delete { background: var(--accent-pink); color: #fff; }
    .btn-cancel { background: #b2bec3; color: #fff; }

    /* 設定用モーダル特殊スタイル */
    .settings-row { display: flex; gap: 8px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #eee; }
</style>
</head>
<body>

<h1>履修・コンピテンス管理</h1>

<div class="term-selector-container">
    <div class="term-tabs" id="term-tabs"></div>
</div>

<div class="container">
    <div class="timetable-wrapper">
        <div id="current-term-label" style="text-align:center; font-weight:bold; color:var(--accent-blue); margin-bottom:5px; font-size:0.9em;"></div>
        
        <table class="timetable" id="timetable">
            <thead>
                <tr>
                    <th class="col-time">時間</th>
                    <th class="col-day">月</th><th class="col-day">火</th><th class="col-day">水</th><th class="col-day">木</th><th class="col-day">金</th>
                </tr>
            </thead>
            <tbody id="timetable-body"></tbody>
        </table>

        <div class="others-section">
            <div class="others-title">時間割外の活動（資格・課外活動など）</div>
            <div id="others-list" class="others-list"></div>
            <button class="btn-add-other" onclick="openOtherModal(-1)">＋ 新しい活動を追加</button>
        </div>
    </div>

    <div class="summary-wrapper">
        <div class="summary-title" style="margin-top:0; border-left-color:var(--accent-yellow);">全学期累計</div>
        <div class="summary-item" style="background:var(--accent-yellow); color:#fff; margin-bottom:15px;">
            <div class="item-header">
                <span>合計単位数</span>
                <span id="sum-credits">0</span>
            </div>
        </div>
        <div id="competence-summary"></div>

        <div class="data-management-area">
            <div class="summary-title" style="margin-top:0;">設定・データ管理</div>
            <button class="btn-settings" onclick="openSettingsModal()">⚙️ コンピテンス・目標設定</button>
            <button class="btn-export" onclick="exportData()">💾 データをバックアップ (保存)</button>
            <button class="btn-import" onclick="triggerImport()">📂 データを復元 (引き継ぎ)</button>
            <input type="file" id="file-input" style="display:none" accept=".json">
            <button class="btn-clear-all" onclick="clearAllData()">🗑 すべてのデータをリセット</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin:0 0 10px 0; text-align:center; color:var(--accent-blue); font-size:1em;">登録</h3>
        
        <input type="hidden" id="edit-type">
        <input type="hidden" id="edit-day">
        <input type="hidden" id="edit-start">
        <input type="hidden" id="edit-id"> 
        
        <div class="form-group" style="background: #f8f9fa; padding: 10px; border-radius: 8px;">
            <label>適用する学期（複数選択可）</label>
            <div id="modal-term-selectors" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
        </div>

        <div class="form-group">
            <label>項目名（科目・活動名）</label>
            <input type="text" id="input-subject" placeholder="入力してください">
        </div>
        <div class="form-group">
            <label>メモ（教室・詳細など）</label>
            <input type="text" id="input-memo" placeholder="詳細など">
        </div>

        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;" id="form-group-end-period">
                <label>終了限</label>
                <select id="input-end-period"></select>
            </div>
            <div class="form-group" style="flex:1;">
                <label>単位数</label>
                <input type="number" id="input-credits" step="0.5" value="0">
            </div>
        </div>

        <div class="summary-title">獲得ポイント</div>
        <div class="point-grid" id="modal-point-grid"></div>

        <div class="btn-container">
            <button class="btn-delete" onclick="deleteData()">削除</button>
            <button class="btn-cancel" onclick="closeModal()">戻る</button>
            <button class="btn-save" onclick="saveData()">保存</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0; text-align:center; color:var(--accent-green); font-size:1em;">⚙️ コンピテンス設定</h3>
        <p style="font-size: 0.75em; color: #636e72; margin-bottom: 15px; text-align: center;">項目名と目標ポイントを自由に変更できます。</p>
        
        <div id="settings-form-container">
            </div>

        <div style="text-align:right; margin-top:10px;">
            <button onclick="resetSettings()" style="background:none; border:none; color:var(--accent-pink); text-decoration:underline; font-size:0.8em; cursor:pointer;">初期設定に戻す</button>
        </div>

        <div class="btn-container">
            <button class="btn-cancel" onclick="closeSettingsModal()">キャンセル</button>
            <button class="btn-save" onclick="saveSettings()">設定を保存</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'competence_app_data';
    const SETTINGS_KEY = 'competence_app_settings';

    // デフォルトの設定（リセット用）
    const defaultCompetenceMeta = {
        gen1: { label: "知の活用力", target: 400, type: "汎用" },
        gen2: { label: "マネジメント能力", target: 250, type: "汎用" },
        gen3: { label: "コミュニケーション能力", target: 250, type: "汎用" },
        gen4: { label: "チームワーク力", target: 250, type: "汎用" },
        gen5: { label: "国際性", target: 250, type: "汎用" },
        pro1: { label: "研究力", target: 700, type: "専門" },
        pro2: { label: "専門知識", target: 700, type: "専門" },
        pro3: { label: "倫理観", target: 200, type: "専門" }
    };

    // 実際に使用する設定（ローカルストレージがあれば上書きされる）
    let competenceMeta = JSON.parse(JSON.stringify(defaultCompetenceMeta));

    const terms = ["1年前A", "1年前B", "1年前C", "1年後A", "1年後B", "1年後C", "2年前A", "2年前B", "2年前C", "2年後A", "2年後B", "2年後C"];
    const timeSlots = [
        { id: 1, label: "1限", time: "8:40-9:55" }, { id: 2, label: "2限", time: "10:10-11:25" },
        { id: "lunch", label: "昼休", time: "11:25-12:15" },
        { id: 3, label: "3限", time: "12:15-13:30" }, { id: 4, label: "4限", time: "13:45-15:00" },
        { id: 5, label: "5限", time: "15:15-16:30" }, { id: 6, label: "6限", time: "16:45-18:00" }
    ];
    const days = ["月", "火", "水", "木", "金"];
    
    function getSubjectColor(subjectName) {
        if (!subjectName) return "var(--cell-filled)";
        let hash = 0;
        for (let i = 0; i < subjectName.length; i++) {
            hash = subjectName.charCodeAt(i) + ((hash << 5) - hash);
        }
        const colors = [
            "#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", 
            "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff", 
            "#ffe5d9", "#d8e2dc", "#fcd5ce", "#e8e8e4",
            "#b9fbc0", "#8eecf5", "#f1c0e8", "#ffcfd2"
        ];
        return colors[Math.abs(hash) % colors.length];
    }

    let scheduleData = {}; 
    let currentTermIndex = 0;

    // ----- データロード・保存 -----
    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData));
    }

    function loadFromStorage() {
        // 設定のロード
        const savedSettings = localStorage.getItem(SETTINGS_KEY);
        if (savedSettings) {
            try { competenceMeta = JSON.parse(savedSettings); } 
            catch (e) { console.error("設定読込エラー", e); }
        }

        // 時間割データのロード
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            try {
                const parsed = JSON.parse(savedData);
                // バックアップで設定込みの形式の場合
                if(parsed.schedule && parsed.settings) {
                    scheduleData = parsed.schedule;
                    competenceMeta = parsed.settings;
                    localStorage.setItem(SETTINGS_KEY, JSON.stringify(competenceMeta));
                } else {
                    scheduleData = parsed;
                }
                
                // ID補完
                Object.values(scheduleData).forEach(t => {
                    if(t.classes) Object.values(t.classes).forEach(c => { if(!c.id) c.id = Date.now() + Math.random().toString(); });
                    if(t.others) t.others.forEach(o => { if(!o.id) o.id = Date.now() + Math.random().toString(); });
                });
            } catch (e) {
                console.error("データの読み込みに失敗しました", e);
                scheduleData = {};
            }
        }
    }

    function getTermData(index) {
        if (!scheduleData[index]) {
            scheduleData[index] = { classes: {}, others: [] };
        }
        return scheduleData[index];
    }

    // ----- 初期化・UI構築 -----
    function init() {
        loadFromStorage();

        const tabContainer = document.getElementById('term-tabs');
        terms.forEach((name, i) => {
            const btn = document.createElement('div');
            btn.className = `term-tab ${i === 0 ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => switchTerm(i);
            tabContainer.appendChild(btn);
        });

        const modalTermContainer = document.getElementById('modal-term-selectors');
        terms.forEach((name, i) => {
            const btn = document.createElement('div');
            btn.className = 'modal-term-toggle';
            btn.innerText = name;
            btn.dataset.index = i;
            btn.onclick = () => btn.classList.toggle('active');
            modalTermContainer.appendChild(btn);
        });

        buildCompetenceUI();
        renderView();
        updateView();
    }

    // コンピテンスに関する画面（サマリーと入力モーダル）を生成
    function buildCompetenceUI() {
        const summaryArea = document.getElementById('competence-summary');
        summaryArea.innerHTML = "";
        let currentType = "";
        Object.entries(competenceMeta).forEach(([key, meta]) => {
            if (currentType !== meta.type) {
                currentType = meta.type;
                const title = document.createElement('div');
                title.className = "summary-title";
                title.innerText = meta.type + "コンピテンス";
                summaryArea.appendChild(title);
            }
            const item = document.createElement('div');
            item.className = "summary-item";
            item.innerHTML = `<div class="item-header"><span>${meta.label}</span><span><span id="sum-${key}">0</span> / <span id="target-${key}">${meta.target}</span></span></div><div class="progress-bar-bg"><div id="bar-${key}" class="progress-bar-fill"></div></div>`;
            summaryArea.appendChild(item);
        });

        const modalGrid = document.getElementById('modal-point-grid');
        modalGrid.innerHTML = "";
        Object.entries(competenceMeta).forEach(([key, meta]) => {
            const group = document.createElement('div');
            group.className = "form-group";
            group.innerHTML = `<label style="font-size: 0.75em; line-height: 1.2; min-height: 2.2em; display: flex; align-items: flex-end; margin-bottom: 4px;">${meta.label.substring(0, 9)}</label><input type="number" id="input-${key}" value="0">`;
            modalGrid.appendChild(group);
        });
    }

    function switchTerm(index) {
        currentTermIndex = index;
        document.querySelectorAll('.term-tab').forEach((t, i) => t.className = `term-tab ${i === index ? 'active' : ''}`);
        renderView();
    }

    // ----- メイン画面描画 -----
    function renderView() {
        document.getElementById('current-term-label').innerText = terms[currentTermIndex] + " のスケジュール";
        const termData = getTermData(currentTermIndex);
        
        const tbody = document.getElementById('timetable-body');
        tbody.innerHTML = "";
        timeSlots.forEach((slot) => {
            const tr = document.createElement('tr');
            if (slot.id === "lunch") tr.className = "lunch-row";
            const th = document.createElement('td');
            th.className = "col-time";
            th.innerHTML = `${slot.label}<br>${slot.time}`;
            tr.appendChild(th);

            if (slot.id !== "lunch") {
                for (let d = 0; d < days.length; d++) {
                    if (isOccupied(d, slot.id, termData.classes)) continue;
                    const td = document.createElement('td');
                    const info = termData.classes[`${d}-${slot.id}`];
                    if (info) {
                        let span = info.endPeriod - slot.id + 1;
                        if (slot.id <= 2 && info.endPeriod >= 3) span++;
                        td.rowSpan = span;
                        td.style.backgroundColor = getSubjectColor(info.subject);
                        td.innerHTML = `<div class="subject-name">${info.subject}</div><div class="subject-memo">${info.memo}</div>`;
                    }
                    td.onclick = () => openClassModal(d, slot.id);
                    tr.appendChild(td);
                }
            } else {
                const td = document.createElement('td');
                td.colSpan = 5; td.innerText = "休憩";
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        });

        const othersList = document.getElementById('others-list');
        othersList.innerHTML = "";
        termData.others.forEach((info, index) => {
            const div = document.createElement('div');
            div.className = 'other-item';
            div.style.borderLeft = `6px solid ${getSubjectColor(info.subject)}`;
            div.innerHTML = `<div><div class="subject-name">${info.subject}</div><div class="subject-memo">${info.memo}</div></div><div style="font-size:0.8em; color:var(--accent-blue);">編集</div>`;
            div.onclick = () => openOtherModal(index, info.id);
            othersList.appendChild(div);
        });
    }

    function isOccupied(day, period, classesData) {
        for (let p = 1; p < period; p++) {
            const info = classesData[`${day}-${p}`];
            if (info && info.endPeriod >= period) return true;
        }
        return false;
    }

    // ----- 登録用モーダル -----
    function openClassModal(day, period) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('edit-type').value = 'class';
        document.getElementById('edit-day').value = day;
        document.getElementById('edit-start').value = period;
        document.getElementById('form-group-end-period').style.display = 'block';
        document.getElementById('modal-title').innerText = `${days[day]}曜${period}限 の登録`;

        const endSelect = document.getElementById('input-end-period');
        endSelect.innerHTML = "";
        for (let i = period; i <= 6; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = `${i}限まで`;
            endSelect.appendChild(opt);
        }

        const data = getTermData(currentTermIndex).classes[`${day}-${period}`] || { subject: "", memo: "", endPeriod: period, credits: 0, id: "" };
        fillModalInputs(data, 'class', day, period);
    }

    function openOtherModal(index, dataId) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('edit-type').value = 'other';
        document.getElementById('form-group-end-period').style.display = 'none';
        document.getElementById('modal-title').innerText = index === -1 ? "時間割外の項目を追加" : "項目の編集";

        const termData = getTermData(currentTermIndex);
        const data = index === -1 ? { subject: "", memo: "", credits: 0, id: "" } : termData.others.find(o => o.id === dataId);
        fillModalInputs(data, 'other', null, null);
    }

    function fillModalInputs(data, type, day, start) {
        document.getElementById('edit-id').value = data.id || "";
        document.getElementById('input-subject').value = data.subject || "";
        document.getElementById('input-memo').value = data.memo || "";
        document.getElementById('input-end-period').value = data.endPeriod || 1;
        document.getElementById('input-credits').value = data.credits || 0;
        Object.keys(competenceMeta).forEach(k => {
            const el = document.getElementById(`input-${k}`);
            if(el) el.value = data[k] || 0;
        });

        document.querySelectorAll('.modal-term-toggle').forEach(btn => {
            btn.classList.remove('active');
            const tIdx = parseInt(btn.dataset.index);
            
            if (data.id) {
                const tData = getTermData(tIdx);
                let hasData = false;
                if (type === 'class') {
                    if (tData.classes[`${day}-${start}`]?.id === data.id) hasData = true;
                } else {
                    if (tData.others.some(o => o.id === data.id)) hasData = true;
                }
                if (hasData) btn.classList.add('active');
            } else {
                if (tIdx === currentTermIndex) btn.classList.add('active');
            }
        });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveData() {
        const type = document.getElementById('edit-type').value;
        const dataId = document.getElementById('edit-id').value || Date.now().toString() + Math.random().toString().slice(2,6); 
        
        const data = {
            id: dataId,
            subject: document.getElementById('input-subject').value,
            memo: document.getElementById('input-memo').value,
            credits: parseFloat(document.getElementById('input-credits').value) || 0
        };
        Object.keys(competenceMeta).forEach(k => {
            const val = document.getElementById(`input-${k}`)?.value;
            data[k] = parseInt(val) || 0;
        });

        const selectedTerms = Array.from(document.querySelectorAll('.modal-term-toggle.active')).map(btn => parseInt(btn.dataset.index));
        if (selectedTerms.length === 0) {
            alert("適用する学期を少なくとも1つ選択してください。");
            return;
        }

        if (type === 'class') {
            const day = document.getElementById('edit-day').value;
            const start = document.getElementById('edit-start').value;
            data.endPeriod = parseInt(document.getElementById('input-end-period').value);
            
            terms.forEach((_, i) => {
                const tData = getTermData(i);
                if (tData.classes[`${day}-${start}`]?.id === dataId) delete tData.classes[`${day}-${start}`];
            });
            selectedTerms.forEach(i => getTermData(i).classes[`${day}-${start}`] = { ...data });

        } else {
            terms.forEach((_, i) => {
                const tData = getTermData(i);
                tData.others = tData.others.filter(o => o.id !== dataId);
            });
            selectedTerms.forEach(i => getTermData(i).others.push({ ...data }));
        }

        renderView();
        updateView();
        saveToStorage();
        closeModal();
    }

    function deleteData() {
        const type = document.getElementById('edit-type').value;
        const dataId = document.getElementById('edit-id').value;

        if (dataId) {
            if (type === 'class') {
                const day = document.getElementById('edit-day').value;
                const start = document.getElementById('edit-start').value;
                terms.forEach((_, i) => {
                    const tData = getTermData(i);
                    if (tData.classes[`${day}-${start}`]?.id === dataId) delete tData.classes[`${day}-${start}`];
                });
            } else {
                terms.forEach((_, i) => {
                    const tData = getTermData(i);
                    tData.others = tData.others.filter(o => o.id !== dataId);
                });
            }
        }

        renderView();
        updateView();
        saveToStorage();
        closeModal();
    }

    // ----- 計算とバー更新 -----
    function updateView() {
        let total = { credits: 0, gen1: 0, gen2: 0, gen3: 0, gen4: 0, gen5: 0, pro1: 0, pro2: 0, pro3: 0 };
        let seenIds = new Set();
        
        Object.values(scheduleData).forEach(term => {
            if(term.classes) {
                Object.values(term.classes).forEach(d => {
                    if (!d.id || !seenIds.has(d.id)) {
                        if (d.id) seenIds.add(d.id);
                        Object.keys(total).forEach(k => total[k] += (d[k] || 0));
                    }
                });
            }
            if(term.others) {
                term.others.forEach(d => {
                    if (!d.id || !seenIds.has(d.id)) {
                        if (d.id) seenIds.add(d.id);
                        Object.keys(total).forEach(k => total[k] += (d[k] || 0));
                    }
                });
            }
        });

        document.getElementById('sum-credits').innerText = total.credits;
        Object.entries(competenceMeta).forEach(([key, meta]) => {
            const val = total[key];
            const percent = Math.min((val / meta.target) * 100, 100);
            const sumEl = document.getElementById(`sum-${key}`);
            const barEl = document.getElementById(`bar-${key}`);
            if(sumEl) sumEl.innerText = val;
            if(barEl) {
                barEl.style.width = percent + "%";
                if (val >= meta.target) barEl.classList.add('achieved');
                else barEl.classList.remove('achieved');
            }
        });
    }

    // ----- コンピテンス設定機能 -----
    function openSettingsModal() {
        document.getElementById('settings-modal').style.display = 'flex';
        const container = document.getElementById('settings-form-container');
        container.innerHTML = "";
        
        let currentType = "";
        Object.entries(competenceMeta).forEach(([key, meta]) => {
            if (currentType !== meta.type) {
                currentType = meta.type;
                const title = document.createElement('div');
                title.style.fontWeight = "bold";
                title.style.fontSize = "0.85em";
                title.style.color = "var(--accent-blue)";
                title.style.marginTop = "10px";
                title.style.marginBottom = "5px";
                title.innerText = `■ ${meta.type}コンピテンス`;
                container.appendChild(title);
            }
            
            const row = document.createElement('div');
            row.className = 'settings-row';
            row.innerHTML = `
                <div style="flex:2">
                    <label style="font-size:0.7em; color:#636e72;">項目名</label>
                    <input type="text" id="setting-label-${key}" value="${meta.label}" style="width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; font-size:0.9em; box-sizing:border-box;">
                </div>
                <div style="flex:1">
                    <label style="font-size:0.7em; color:#636e72;">目標値</label>
                    <input type="number" id="setting-target-${key}" value="${meta.target}" style="width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; font-size:0.9em; box-sizing:border-box;">
                </div>
            `;
            container.appendChild(row);
        });
    }

    function closeSettingsModal() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    function saveSettings() {
        Object.keys(competenceMeta).forEach(key => {
            const labelVal = document.getElementById(`setting-label-${key}`).value;
            const targetVal = parseInt(document.getElementById(`setting-target-${key}`).value);
            if (labelVal) competenceMeta[key].label = labelVal;
            if (targetVal > 0) competenceMeta[key].target = targetVal;
        });

        localStorage.setItem(SETTINGS_KEY, JSON.stringify(competenceMeta));
        buildCompetenceUI(); // UIを再構築
        updateView();        // プログレスバー再計算
        closeSettingsModal();
    }

    function resetSettings() {
        if(confirm("コンピテンスの項目名と目標ポイントを初期状態に戻しますか？（入力済みのポイントは消えません）")) {
            competenceMeta = JSON.parse(JSON.stringify(defaultCompetenceMeta));
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(competenceMeta));
            buildCompetenceUI();
            updateView();
            closeSettingsModal();
        }
    }

    // ----- データ管理機能 -----
    function exportData() {
        // 設定データも含めてエクスポート
        const exportObj = {
            schedule: scheduleData,
            settings: competenceMeta
        };
        const dataStr = JSON.stringify(exportObj);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        
        const now = new Date();
        const dateStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}`;
        a.download = `competence_backup_${dateStr}.json`;
        
        a.click();
        URL.revokeObjectURL(url);
    }

    function triggerImport() {
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                // 設定が含まれるフォーマットの場合
                if(importedData.schedule && importedData.settings) {
                    scheduleData = importedData.schedule;
                    competenceMeta = importedData.settings;
                } else {
                    scheduleData = importedData; // 古いバックアップの互換性
                }
                
                saveToStorage();
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(competenceMeta));
                
                buildCompetenceUI();
                renderView();
                updateView();
                alert("データを無事に復元しました！");
            } catch(err) {
                alert("ファイルの読み込みに失敗しました。正しいバックアップファイルを選んでください。");
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    });

    function clearAllData() {
        if(confirm("保存されているすべての学期のデータを削除します。本当によろしいですか？（元に戻せません）")) {
            localStorage.removeItem(STORAGE_KEY);
            scheduleData = {};
            renderView();
            updateView();
        }
    }

    // 起動
    init();

</script>
